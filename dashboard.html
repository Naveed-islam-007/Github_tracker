<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwiind and daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS -->
     <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="grid grid-cols-1 md:flex navbar bg-base-100 shadow-sm justify-between">
    <div class="flex items-center gap-2 w-[250px]">
        <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
        <h2 class="text-xl font-bold">GitHub Issue Tracker</h2>
        
    </div>

    <div class="flex gap-2 items-center ">
          <input id="inpval" type="search" placeholder="Search Issues" class="input input-bordered input-sm w-full max-w-xs" />
          <button id="inpbtn"  class="btn btn-primary">Search</button>
        <button class="btn btn-primary">+New Issue</button>
    </div>
</div>

<div class="w-11/12 mx-auto shadow-md flex gap-5 my-5 p-3">
   <button id="allbtn" onclick="selectcategory('allbtn')" class="btn btn-primary">All</button>
   <button id="openbtn" onclick="selectcategory('openbtn')" class="btn btn-soft">Open</button>
   <button id="closedbtn" onclick="selectcategory('closedbtn')" class="btn btn-soft">Closed</button>
</div>


    <div class="w-11/12 mx-auto shadow-md flex justify-between">
       <div class="flex p-5 gap-3">
         <img src="./assets/Aperture.png" alt="">
        <div>
            <h2 id="count" class="text-2xl font-bold">50 issues</h2>
            <p>Track and manage your project issues</p>
        </div>
       </div>

       <div class="grid grid-cols-1 md:flex items-center gap-4 mr-5">
          <div aria-label="status" class="status status-primary "></div>
              closed
          <div aria-label="success" class="status status-success"></div>
          open
       </div>
    </div>

    <div id="api-container" class="w-11/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 p-5 gap-5">
        
      
    </div>

 
    <!-- Modal -->
     <!-- Open the modal using ID.showModal() method -->
<button class="btn" onclick="card.showModal()">open modal</button>
<dialog id="card" class="modal">
  <div class="modal-box space-y-6">
     <h2 id="pdetails" class="text-lg font-bold">Problem Details</h2>
     <div class="flex gap-3">
        <div class="badge badge-success">Opened</div>
       <p id="author">Opened by author</p>
       <p id="date">Open date</p>
     </div>

     <div class="flex gap-2">
        <span id="label1">label1</span>
        <span id="label2">label2</span>

     </div>
     <p id="description">description</p>

     <div class="w-11/12 mx-auto bg-gray-200 flex justify-between p-2">
        <div>
             <p>Assignee:</p>
        <p id="name" class= "text-xl font-bold">Fahim ahmed</p>
       </div>
       <div>
       <p class="font-bold">Priority</p>
       <p id="priority">Priority</p>
        </div>
     </div>
   
     <div class="flex justify-end">
         <button onclick="closeModal()" class=" btn btn-primary ">close</button>
     </div>
    

  </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button   class="btn hidden">Close</button>
      </form>
    </div>
  </div>
</dialog>


<script src="dashboard.js"></script>

</body>
</html>
