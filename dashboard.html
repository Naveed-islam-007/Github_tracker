<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwiind and daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS -->
     <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="grid grid-cols-1 md:flex navbar bg-base-100 shadow-sm justify-between">
    <div class="flex items-center gap-2 w-[250px]">
        <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
        <h2 class="text-xl font-bold">GitHub Issue Tracker</h2>
        
    </div>

    <div class="flex gap-2 items-center ">
          <input type="search" placeholder="Search Issues" class="input input-bordered input-sm w-full max-w-xs" />
        <button class="btn btn-primary">+New Issue</button>
    </div>
</div>

<div class="w-11/12 mx-auto shadow-md flex gap-5 my-5 p-3">
     <button class="btn btn-primary">All</button>
     <button class="btn btn-soft">Open</button>
     <button class="btn btn-soft">Closed</button>
</div>


    <div class="w-11/12 mx-auto shadow-md flex justify-between">
       <div class="flex p-5 gap-3">
         <img src="./assets/Aperture.png" alt="">
        <div>
            <h2 class="text-2xl font-bold">50 issues</h2>
            <p>Track and manage your project issues</p>
        </div>
       </div>

       <div class="grid grid-cols-1 md:flex items-center gap-4 mr-5">
          <div aria-label="status" class="status status-primary "></div>
              closed
          <div aria-label="success" class="status status-success"></div>
          open
       </div>
    </div>

    <div id="api-container" class="w-11/12 mx-auto grid grid-cols-4 p-5 gap-5">
        
      
    </div>

<script src="dashboard.js"></script>

</body>
</html>
